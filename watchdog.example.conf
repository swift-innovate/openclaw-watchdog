# ═══════════════════════════════════════════════════════════════════════════════
# openclaw-watchdog configuration
#
# Copy this file to ~/.openclaw/watchdog.conf and edit to match your setup.
# All values shown are defaults — uncomment and change as needed.
#
# This file is sourced as bash, so standard shell syntax applies.
# DO NOT commit this file with real tokens — it contains secrets.
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Gateway ──────────────────────────────────────────────────────────────────
# URL and health endpoint for your OpenClaw gateway
# GATEWAY_URL="http://localhost:18789"
# HEALTH_ENDPOINT="/api/health"

# ─── Config file ──────────────────────────────────────────────────────────────
# Path to the openclaw.json config file to monitor
# OPENCLAW_JSON="$HOME/.openclaw/openclaw.json"

# ─── Telegram alerts (optional) ──────────────────────────────────────────────
# Leave empty to disable Telegram alerts (alerts will only go to the log)
# TELEGRAM_BOT_TOKEN="your-bot-token-here"
# TELEGRAM_CHAT_ID="your-chat-id-here"

# ─── Timing ───────────────────────────────────────────────────────────────────
# Seconds between health checks (loop mode only)
# CHECK_INTERVAL=60

# Number of consecutive failures before alerting/acting (anti-flap)
# CONSECUTIVE_FAILURES_BEFORE_ALERT=2

# ─── Archives ─────────────────────────────────────────────────────────────────
# Where to store backups and broken config archives
# BACKUP_DIR="$HOME/.openclaw/watchdog"
# BROKEN_DIR="$HOME/.openclaw/watchdog/broken"
# LAST_GOOD="$HOME/.openclaw/watchdog/last-known-good.json"

# Maximum number of broken configs to keep (oldest pruned first)
# MAX_BROKEN_ARCHIVES=50

# ─── Agent notification ───────────────────────────────────────────────────────
# When the watchdog recovers from a crash, it can write a note to the agent's
# MEMORY.md so the agent knows what happened and doesn't retry the same
# broken change. Leave AGENT_MEMORY empty to skip this.
#
# Recovery log (always written — latest recovery only):
# RECOVERY_LOG="$HOME/.openclaw/watchdog/last-recovery.md"
#
# Agent memory file (appended to — set to your agent's MEMORY.md):
# AGENT_MEMORY="$HOME/.openclaw/workspace/MEMORY.md"

# ─── Logging ──────────────────────────────────────────────────────────────────
# LOG_FILE="$HOME/.openclaw/watchdog/watchdog.log"

# Log rotation threshold in bytes (default: 1MB)
# MAX_LOG_BYTES=1048576

# ─── Restart command ──────────────────────────────────────────────────────────
# Command to restart the OpenClaw gateway. Adjust for your setup.
# RESTART_CMD="systemctl --user restart openclaw-gateway.service 2>/dev/null || openclaw gateway restart 2>/dev/null"
